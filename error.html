<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Error Page</title>

    <link rel="stylesheet" href="./src/output.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css">

</head>

<body>


    <div id="header"></div>

    <section class="max-w-container mx-auto min-h-[550px] flex flex-col">

        <div class="px-6 py-4 text-sm text-gray-500 font-semibold">
            <a href="./index.html" class="hover:text-black transition">Home</a> /
            <span class="text-black">404 Error</span>
        </div>

        <div class="flex-1 flex items-center justify-center px-4">
            <div class="text-center space-y-6">

                <h1 class="text-5xl md:text-7xl font-semibold text-black">
                    404 Not Found
                </h1>

                <p class="text-gray-500 text-sm md:text-base">
                    Your visited page not found. You may go home page.
                </p>

                <a href="./index.html"
                    class="inline-block bg-red-500 hover:bg-red-600 text-white px-6 py-3 rounded-md transition duration-300">
                    Back to home page
                </a>

            </div>
        </div>

    </section>


    <div id="footer"></div>



    <script src="./js/header.js"></script>
    <script src="./js/script.js"></script>
</body>

</html>
