<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Page</title>
    <link rel="stylesheet" href="./src/output.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css">

</head>

<body>

    <div id="header"></div>

    <section class="flex items-center justify-center px-4">

        <div class="login-main">

            <div class="login-img">
                <img src="./img/login/login.jpg" alt="shopping" class="w-full object-contain">
            </div>

            <div class="login-right">
                <div class="w-full max-w-sm">

                    <h2 class="login-h2">Log in to Exclusive</h2>
                    <p class="mb-6">Enter your details below</p>

                    <div class="space-y-5">
                        <input type="text" placeholder="Email or Phone Number" class="login-input">
                        <input type="password" placeholder="Password" class="login-input">
                    </div>

                    <div class="flex items-center justify-between mt-6">
                        <button class="login-btn">Log In</button>

                        <a href="./error.html" class="login-forgot">Forget Password?</a>

                    </div>
                </div>
            </div>
        </div>

    </section>



    <div id="footer"></div>


    <script src="./js/header.js"></script>
    <script src="./js/script.js"></script>
</body>

</html>
