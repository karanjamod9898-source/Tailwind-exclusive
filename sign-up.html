<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign-up Page</title>
    <link rel="stylesheet" href="./src/output.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css">

</head>

<body>

    <div id="header"></div>

    <section class="flex items-center justify-center px-4">

        <div class="login-main">

            <div class="login-img">
                <img src="./img/login/login.jpg" alt="shopping" class="w-full object-contain">
            </div>

            <div class="login-right">
                <div class="w-full max-w-sm">

                    <h2 class="login-h2">Create an account</h2>
                    <p class="mb-6">Enter your details below</p>

                    <div class="space-y-5">
                        <input type="text" placeholder="Name" class="login-input">
                        <input type="text" placeholder="Email or Phone Number" class="login-input">
                        <input type="password" placeholder="Password" class="login-input">
                    </div>

                    <button class="creat-btn">Create Account</button>

                    <div class="sign-up-btn">
                        <button class="flex gap-2 justify-self-center">
                            <img src="./img/login/Icon-Google.png" alt="Icon-google">
                            Sign up with Google
                        </button>

                    </div>

                    <div class="flex gap-2 mt-3 w-full justify-center">
                        <p>Already have account?</p>
                        <a href="./login.html" class="underline">Log in</a>
                    </div>
                </div>
            </div>
        </div>

    </section>



    <div id="footer"></div>


    <script src="./js/header.js"></script>
    <script src="./js/script.js"></script>
</body>

</html>
