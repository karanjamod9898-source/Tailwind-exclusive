<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Account Page</title>
    <link rel="stylesheet" href="./src/output.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css">


</head>

<body>

    <div id="header"></div>

    <section class="py-10 px-4">
        <div class="contact-links justify-between flex">
            <div>
                <a href="./index.html" class="hover:text-black">Home</a> /
                <span class="text-black">My Account</span>
            </div>
            <div>
                <p>Welcome! <span class="text-danger">MD Rimel</span></p>
            </div>
        </div>

        <div class="contact-main">

            <div class="contact-left space-y-10">
                <div class="">
                    <div class="flex items-center gap-3 mb-3">
                        <h3 class="font-bold">Manage My Account</h3>
                    </div>
                    <ul>
                        <a href="#javascript:void(0)" class="account-a text-danger">
                            <li class="space-x-5 pl-10">My Profile</li>
                        </a>
                        <a href="#javascript:void(0)" class="account-a">
                            <li class="space-x-5 pl-10">Address Book</li>
                        </a>
                        <a href="#javascript:void(0)" class="account-a">
                            <li class="space-x-5 pl-10">My Payment Options</li>
                        </a>
                    </ul>
                </div>
                <div class="">
                    <div class="flex items-center gap-3 mb-3">
                        <h3 class="font-bold">My Orders</h3>
                    </div>
                    <ul>
                        <a href="#javascript:void(0)" class="account-a">
                            <li class="space-x-5 pl-10">My Returns</li>
                        </a>
                        <a href="#javascript:void(0)" class="account-a">
                            <li class="space-x-5 pl-10">My Cancellations</li>
                        </a>
                    </ul>
                </div>
                <div class="">
                    <div class="flex items-center gap-3 mb-3">
                        <a href="./wishlist.html">
                            <h3 class="font-bold">My Wishlist</h3>
                        </a>
                    </div>
                    <ul>
                        <!-- <li class="space-x-5 pl-10">My Returns</li> -->
                        <!-- <li class="space-x-5 pl-10">My Cancellations</li> -->
                    </ul>
                </div>
            </div>
            <div class="contact-right border lg:p-14">

                <h2 class="text-2xl font-semibold text-red-500 mb-6">
                    Edit Your Profile
                </h2>

                <div class="grid md:grid-cols-2 gap-4 mb-4">
                    <div>
                        <label class="block mb-2 text-sm font-medium">
                            First Name
                        </label>
                        <input type="text" placeholder="Md" class="w-full bg-gray-100 p-3 rounded outline-none">
                    </div>

                    <div>
                        <label class="block mb-2 text-sm font-medium">
                            Last Name
                        </label>
                        <input type="text" placeholder="Rimel" class="w-full bg-gray-100 p-3 rounded outline-none">
                    </div>
                </div>

                <div class="grid md:grid-cols-2 gap-4 mb-4">
                    <div>
                        <label class="block mb-2 text-sm font-medium">
                            Email
                        </label>
                        <input type="email" placeholder="rimell111@gmail.com"
                            class="w-full bg-gray-100 p-3 rounded outline-none">
                    </div>

                    <div>
                        <label class="block mb-2 text-sm font-medium">
                            Address
                        </label>
                        <input type="text" placeholder="Kingston, 5236, United State"
                            class="w-full bg-gray-100 p-3 rounded outline-none">
                    </div>
                </div>

                <div class="mb-4">
                    <label class="block mb-2 text-sm font-medium">
                        Password Changes
                    </label>

                    <input type="password" placeholder="Current Password"
                        class="w-full bg-gray-100 p-3 rounded outline-none mb-3">

                    <input type="password" placeholder="New Password"
                        class="w-full bg-gray-100 p-3 rounded outline-none mb-3">

                    <input type="password" placeholder="Confirm New Password"
                        class="w-full bg-gray-100 p-3 rounded outline-none">
                </div>

                <div class="flex justify-end items-center gap-4 mt-6">
                    <button class="text-gray-600">
                        Cancel
                    </button>

                    <button class="bg-red-500 text-white px-6 py-2 rounded hover:bg-red-600 transition">
                        Save Changes
                    </button>
                </div>

            </div>

        </div>


    </section>


    <div id="footer"></div>

    <script src="./js/header.js"></script>
    <script src="./js/script.js"></script>

</body>

</html>
