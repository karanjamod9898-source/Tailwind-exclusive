    <div id="footer"></div>


    <script>
        function loadWishlistPage() {
            const container = document.getElementById("wishlist-container");

            if (!container) return;

            const wishlist = JSON.parse(localStorage.getItem("wishlist")) || [];

            container.innerHTML = "";

            // COUNT UPDATE
            let count = wishlist.length;

            // TOP TITLE ADD (dynamic)

            // EMPTY STATE
            if (wishlist.length === 0) {
                container.innerHTML = `
            <p class="col-span-full text-center text-gray-500 text-lg underline">
                No items in wishlist
            </p>
        `;
                return;
            }

            wishlist.forEach((item, index) => {
                container.innerHTML += `    
        <div class="bg-white shadow-sm rounded-lg overflow-hidden">

            <div class="relative bg-gray-100">

                <!-- REMOVE BTN -->
                <button class="absolute top-2 text-danger right-2 bg-white p-2 rounded-full shadow remove-btn"
                    data-index="${index}">
                    <i class="fa-solid fa-trash"></i>
                </button>

                <img src="${item.img}" class="w-full h-48 object-contain">

                <button class="w-full mt-3 bg-black text-white py-2 text-sm">
                    Add To Cart
                </button>
            </div>

            <div class="p-3">
                <h4 class="font-semibold text-sm">${item.name}</h4>
                <p class="text-red-500 font-bold mt-1">$${item.price}</p>
            </div>

        </div>
        `;
            });
        }


        // REMOVE ITEM
        document.addEventListener("click", function (e) {
            const btn = e.target.closest(".remove-btn");
            if (!btn) return;

            const index = btn.dataset.index;

            let wishlist = JSON.parse(localStorage.getItem("wishlist")) || [];

            wishlist.splice(index, 1);

            localStorage.setItem("wishlist", JSON.stringify(wishlist));

            loadWishlistPage();

            // HEADER COUNT UPDATE
            if (typeof updateWishlistCount === "function") {
                updateWishlistCount();
            }
        });


        // LOAD
        window.addEventListener("load", loadWishlistPage);
    </script>
