<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact-page</title>

    <link rel="stylesheet" href="./src/output.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css">


</head>

<body>

    <div id="header"></div>

    <section class="py-10 px-4">
        <div class="contact-links">
            <a href="./index.html" class="hover:text-black">Home</a> /
            <span class="text-black">Contact</span>
        </div>

        <div class="contact-main">

            <div class="contact-left">
                <div class="">
                    <div class="flex items-center gap-3 mb-3">
                        <div class="contact-icon">
                            <i class="fa-solid fa-phone"></i>
                        </div>
                        <h3 class="font-bold">Call To Us</h3>
                    </div>
                    <p class="text-sm mb-2">
                        We are available 24/7, 7 days a week.
                    </p>
                    <p class="text-sm">Phone: +8801611112222</p>
                </div>

                <div class="my-8 border-t border-gray-300"></div>

                <div class="space-y-4">
                    <div class="flex items-center gap-3 mb-3">
                        <div class="contact-icon">
                            <i class="fa-regular fa-envelope"></i>
                        </div>
                        <h3 class="font-bold">Write To Us</h3>
                    </div>
                    <p class="text-sm mb-2">
                        Fill out our form and we will contact you within 24 hours.
                    </p>
                    <p class="text-sm">Emails: customer@exclusive.com</p>
                    <p class="text-sm">Emails: customer@exclusive.com</p>
                </div>
            </div>

            <div class="contact-right border lg:p-10">

                <div class="grid grid-cols-1 md:grid-cols-3 gap-4 mb-4">
                    <input type="text" placeholder="Your Name *" class="contact-input">

                    <input type="email" placeholder="Your Email *" class="contact-input">

                    <input type="text" placeholder="Your Phone *" class="contact-input">
                </div>

                <textarea rows="6" placeholder="Your Message" class="contact-textarea"></textarea>

                <div class="text-right">
                    <button class="btn-danger">
                        Send Message
                    </button>
                </div>

            </div>

        </div>
    </section>


    <div id="footer"></div>

    <script src="./js/header.js"></script>
    <script src="./js/script.js"></script>

</body>

</html>
